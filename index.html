<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soundboard Emotion Studio</title>
    
<link rel="stylesheet" href="style.css" /></head>
<body>

    <header>
        <h1>🎛️ EMOTION STUDIO</h1>
        <div class="controls">
            <div class="mode-selector">
                <label class="mode-option">
                    <input type="radio" name="mode" value="Normal" checked="" />
                    <span class="mode-btn">Normal</span>
                </label>
                <label class="mode-option">
                    <input type="radio" name="mode" value="Repeat" />
                    <span class="mode-btn">Repeat</span>
                </label>
                <label class="mode-option">
                    <input type="radio" name="mode" value="Continue" />
                    <span class="mode-btn">Continue</span>
                </label>
            </div>
            
            <div class="volume-control">
                <span>🔊</span>
                <input type="range" id="masterVolume" min="0" max="1" step="0.01" value="0.8" />
            </div>

            <button class="rec-btn" id="recBtn">
                <span class="rec-dot"></span> <span id="recText">REC</span>
            </button>
        </div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" data-tab="Happiness">😊 Happiness</button>
        <button class="tab-btn" data-tab="Sadness">😢 Sadness</button>
        <button class="tab-btn" data-tab="Fear">😨 Fear</button>
        <button class="tab-btn" data-tab="Anger">😡 Anger</button>
        <button class="tab-btn" data-tab="Disgust">🤢 Disgust</button>
        <button class="tab-btn" data-tab="Surprise">😲 Surprise</button>
    </div>

    <main>
        <div class="import-section">
            <button class="import-btn" onclick="document.getElementById('fileInput').click()">+ Import MP3s</button>
            <input type="file" id="fileInput" accept="audio/*" multiple="" />
            <span id="statusText" style="color: var(--text-muted); font-size: 0.9rem;">Ready</span>
        </div>
        
        <div id="padGrid"></div>
    </main>

    <div id="recIndicator">
        <span class="rec-dot"></span> RECORDING: <span id="recTime">00:00</span>
    </div>

    

<script src="script.js"></script></body></html>
